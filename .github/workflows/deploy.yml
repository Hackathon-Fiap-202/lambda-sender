name: Test and Deploy to AWS

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  IMAGE_TAG: latest

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # 1️⃣ Checkout repository
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------
      # 2️⃣ Setup Terraform
      # ------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # ------------------------------
      # 3️⃣ Cache Terraform providers
      # ------------------------------
      - name: Cache Terraform providers
        uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugin-cache
            infra/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/**/*.tf*') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      # ------------------------------
      # 4️⃣ Configure AWS (OIDC + IAM Role)
      # ------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-action-role
          aws-region: ${{ env.AWS_REGION }}

      # ------------------------------
      # 5️⃣ Terraform – validação e criação do ECR
      # ------------------------------
      - name: Terraform Format
        run: terraform fmt -check -diff || true
        working-directory: infra

      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra

      - name: Terraform Apply (ECR)
        id: tf_apply_ecr
        run: |
          terraform apply -target=aws_ecr_repository.lambda_sender_repo \
                    -auto-approve

          # Captura o URI do ECR
          echo "LAMBDA_SENDER_ECR_URI=$(terraform output -raw ecr_lambda_sender_url)" >> $GITHUB_ENV
        working-directory: infra

      # ------------------------------
      # 6️⃣ Docker Build & Push
      # ------------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login no Amazon ECR
        run: |
          # Extrair apenas o host do ECR
          SENDER_ECR_HOST=$(echo ${{ env.LAMBDA_SENDER_ECR_URI }} | cut -d'/' -f1)

          # Login Docker
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin $SENDER_ECR_HOST

      - name: Build, Tag e Push Lambda Sender
        run: |
          docker build -t lambda-sender src/lambda_sender/
          docker tag lambda-sender:latest ${{ env.LAMBDA_SENDER_ECR_URI }}:latest
          docker push ${{ env.LAMBDA_SENDER_ECR_URI }}:latest
      

      # ------------------------------
      # 7️⃣ Terraform – Deploy Lambdas
      # ------------------------------
      - name: Terraform Plan para Deploy
        run: |
          terraform plan -out=tfplan
        working-directory: infra

      - name: Terraform Apply (Deploy Completo)
        run: |
          terraform apply -auto-approve tfplan
        working-directory: infra
