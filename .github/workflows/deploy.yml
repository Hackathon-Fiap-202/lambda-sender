name: Deploy Lambda Sender to AWS

on:
  push:
    branches:
      - main

concurrency:
  group: lambda-sender-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: lambda-sender

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # 1. Checkout
      # ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------
      # 2. Configure AWS credentials (OIDC)
      # ----------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------------------------
      # 3. Setup Terraform
      # ----------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Cache Terraform providers
        uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugin-cache
            infra/.terraform
          key: ${{ runner.os }}-terraform-lambda-sender-${{ hashFiles('infra/**/*.tf*') }}
          restore-keys: |
            ${{ runner.os }}-terraform-lambda-sender-

      # ----------------------------------------
      # 4. Terraform – ensure ECR repo exists
      # ----------------------------------------
      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra

      - name: Terraform Plan (ECR bootstrap)
        run: |
          terraform plan \
            -target=aws_ecr_repository.lambda_sender \
            -target=aws_ecr_lifecycle_policy.lambda_sender \
            -out=tfplan-ecr
        working-directory: infra

      - name: Terraform Apply (ECR bootstrap)
        run: terraform apply -auto-approve tfplan-ecr
        working-directory: infra

      # ----------------------------------------
      # 5. Docker – build & push to ECR
      # ----------------------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_URI: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
        run: |
          docker build \
            --platform linux/amd64 \
            --provenance=false \
            -t $ECR_URI:$IMAGE_TAG \
            -t $ECR_URI:latest \
            src/lambda_sender/
          docker push $ECR_URI:$IMAGE_TAG
          docker push $ECR_URI:latest

      # ----------------------------------------
      # 6. Terraform – deploy Lambda with new image
      # ----------------------------------------
      - name: Terraform Plan (deploy)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          terraform plan \
            -var="lambda_image_tag=$IMAGE_TAG" \
            -out=tfplan-deploy
        working-directory: infra

      - name: Terraform Apply (deploy)
        run: terraform apply -auto-approve tfplan-deploy
        working-directory: infra
